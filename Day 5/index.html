<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
        .container{
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
        }
.card{
            background-color:rgb(248, 248, 4);
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 200px;
            padding: 10px;
            margin: 10px;
            border-radius: 10px;
}
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <p class="title">Title: Pansonic Remote control</p>
        <p class="rating">⭐⭐⭐⭐</p>
      </div>

      <div class="card">
        <p class="title">Title: redmi phone</p>
        <p class="rating">⭐⭐⭐⭐</p>
      </div>

      <div class="card">
        <button class="btn">click me here</button>
      </div>
    </div>
    <script>
        const cardDiv= document.querySelector('.card');
 const button1= document.querySelector('.btn');

button1.addEventListener('click',()=>{
cardDiv.style.background='red'
})
 

 console.log('----->',cardDiv);
    </script>
  </body>
</html>
