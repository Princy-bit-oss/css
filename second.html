<!DOCTYPE html>
<html lang="en">
<head>

    <title>Business Card</title>
    <style>
        .profile-img{
            width:200px;
            height:200px;
            border-radius:50%;
            object-fit:cover;
            margin:15px 0;
        }

        body{
            background-color:gray;
        }

        .container{
            background-color:white;
            width:75%;
            margin:40px auto;
            max-width:fit-content;
            padding:30px;

            text-align:center;

        }

        h1{
            font-size:22px;
            margin:10px 0 5px;
        }

        p{
            color:gray;
            font-size:14px;
            margin-bottom:15px;
        }

        .btn{
            padding:10px 15px;
            margin:5px;
            border:none;
            border-radius:5px;
            background-color:#202040;
            cursor:pointer;
            font-size:14px;
        }

        a{
            color:white;
            text-decoration:none;
        }

        .btn:hover{
            background-color:#404070;
            
        }
    </style>
</head>

        <button class="btn">
