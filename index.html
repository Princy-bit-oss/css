D<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Source Sans 3", sans-serif;
      }

      /* Navbar */

      .navbar {
        display: flex;
        justify-content: space-around;
        align-items: center;
        padding: 10px;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 20px;
      }

      .logo img {
        height: 72px;
      }

      .logo .companyName {
        display: flex;
        flex-direction: column;
        font-weight: bolder;
        line-height: 1em;
      }

      .logo .companyName span {
        color: #09568a;
      }

      /* Days */

      .daysLink {
        display: flex;
        align-items: center;
        list-style: none;
        gap: 24px;
        font-weight: 600;
      }

      .daysLink li {
        color: #4a4a4a;
        padding: 2px;
        border-bottom: 2px solid transparent;
        border-radius: 3px;
        transition: all;
        animation-duration: 200ms;
      }

      .daysLink li:hover {
        border-color: #09568a;
        color: #09568a;
      }

      /* Button */
      .hamburger {
        background: #000;
        color: white;
        border-radius: 3px;
        border: none;
        padding: 8px;
        padding-bottom: 4px;
      }
      .hamburger img {
        height: 20px;
      }

      .hamburger:hover {
        background: #000000da;
      }

      .hamburger {
        display: none;
      }

      /* Responsive */
      @media screen and (max-width: 646px) {
        .daysLink {
          display: none;
        }

        .active {
          display: flex;
          flex-direction: column;
          background-color: #f6f3f3;
          width: 120px;
          position: absolute;
          top: 70px;
          right: 0;
          gap: 10px;
          padding: 10px;
        }

        .hamburger {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Navbar -->
      <div class="navbar">
        <!-- logo -->
        <div class="logo">
          <img src="logo.webp" alt="logo" />
          <div class="companyName">
            <span>Satyaansh Softech</span>
            Pvt. Ltd.
          </div>
        </div>

        <!-- Menu-Items -->
        <ul class="daysLink">
          <li onclick="loadPage('Day 1/index.html')">Day 1</li>
          <li onclick="loadPage('Day 2/index.html')">Day 2</li>
          <li onclick="loadPage('Day 3/index.html')">Day 3</li>
          <li onclick="loadPage('Day 4/index.html')">Day 4</li>
          <li onclick="loadPage('Day 5/index.html')">Day 5</li>
          <li onclick="loadPage('Day 6/index.html')">Day 6</li>
          <li onclick="loadPage('Day 7/index.html')">Day 7</li>
          <li onclick="loadPage('Day 8/index.html')">Day 8</li>
        </ul>

        <!-- right button -->
        <button class="hamburger">
          <img src="images/hambuger.png" alt="menu" />
        </button>
      </div>

      <!-- Days -->
      <iframe id="dayFrame" src="Day 1/index.html" width="100%" height="800">
      </iframe>
    </div>
    <script>
      const hamburger = document.querySelector(".hamburger");
      const daysLink = document.querySelector(".daysLink");

      hamburger.addEventListener("click", () => {
        daysLink.classList.toggle("active");
      });

      function loadPage(page) {
        let frame = document.getElementById("dayFrame");
        frame.src = page;
      }
    </script>
  </body>
</html>
